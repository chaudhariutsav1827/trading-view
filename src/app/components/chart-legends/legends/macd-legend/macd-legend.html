<div class="legend-static">
  <span class="legend-item">{{ series()?.name }} </span>
  <span class="legend-item">{{ params()?.fastPeriods }}</span>
  <span class="legend-item">{{ params()?.signalPeriods }}</span>
  <span class="legend-item">{{ params()?.slowPeriods }}</span>
</div>
@if (isVisible()) {
  <div class="legend-values">
    <span class="legend-item" [style.color]="options()?.macdLineColor" title="MACD">
      {{ legendValue()?.macd }}
    </span>
    <span class="legend-item" [style.color]="options()?.signalLineColor" title="Signal">
      {{ legendValue()?.signal }}
    </span>
    <span class="legend-item" [style.color]="legendValue()?.color" title="Histogram">
      {{ legendValue()?.histogram }}
    </span>
  </div>
}
