<header>
  <div class="logo">◈ CHARTLAB</div>
  <div class="ticker">
    <button class="ticker-btn" (click)="openSymbolSearchDialog()">
      {{ appStore.settings.symbol$().symbol }}
      <span class="ticker-caret">▾</span>
    </button>
  </div>
  <div class="header-actions">
    <button class="action-btn" (click)="toggleTheme()" title="Toggle theme">
      <span class="action-icon">◑</span>
      <span class="action-label">Theme</span>
    </button>
    <button class="action-btn" (click)="importData()" title="Import data">
      <span class="action-icon">↑</span>
      <span class="action-label">Import</span>
    </button>
    <button class="action-btn" (click)="exportScreenshot()" title="Export screenshot">
      <span class="action-icon">↓</span>
      <span class="action-label">Export</span>
    </button>
    <button class="action-btn action-btn--help" (click)="openHelp()" title="Help">
      <span class="action-icon">?</span>
    </button>
  </div>
</header>
