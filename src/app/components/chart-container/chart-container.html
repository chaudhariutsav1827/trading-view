<div class="chart-wrapper">
  <div class="chart-controls">
    @for (timeframe of timeFrameOptions; track timeframe.value) {
      <button
        class="btn"
        [class.active]="timeframe.value === appStore.settings.settings$().timeframe.value"
        (click)="onTimeframeChange(timeframe)"
      >
        {{ timeframe.label }}
      </button>
    }
    <span style="flex: 1"></span>
    <span style="font-size: 0.72rem; color: var(--muted); font-family: 'Space Mono', monospace"
      >← Scroll to load more →</span
    >
  </div>

  <div #chartContainer id="chart-container" (mousedown)="onMouseDown()" (mouseup)="onMouseUp()">
    @if (appStore.loader.loader$()) {
      <div class="loading-indicator" id="loader">⟳ Loading more candles…</div>
    }
    <app-chart-legends />
  </div>

  <div class="status-bar">
    <span><span class="dot"></span>Live simulation</span>
    <span id="candle-count">{{ totalCandles() }} candles loaded</span>
  </div>
</div>
